name: Fetch Syria News

on:
  schedule:
    - cron: '0 11 * * *'   # 6AM EST (UTC-5) = 11:00 UTC
    - cron: '0 23 * * *'   # 6PM EST (UTC-5) = 23:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure docs directory and .nojekyll exist
        run: |
          mkdir -p docs
          touch docs/.nojekyll

      - name: Run news fetcher
        run: python syria_news.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/syria_news.json docs/.nojekyll
          git diff --cached --quiet || git commit -m "chore: update syria_news.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
